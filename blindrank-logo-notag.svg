<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" width="3120" height="1620">
  <defs>
    <filter id="blur-blind" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Blind — blurred -->
  <text
    x="260" y="112"
    font-family="Playfair Display Medium, Playfair Display, serif"
    font-weight="500"
    font-size="86"
    fill="#b0b0b0"
    text-anchor="middle"
    letter-spacing="0.8"
    filter="url(#blur-blind)"
  >Blind</text>

  <!-- Rank. — stroke layer -->
  <text
    x="260" y="196"
    font-family="Playfair Display Medium, Playfair Display, serif"
    font-weight="500"
    font-size="114"
    fill="transparent"
    stroke="#0a0a0a"
    stroke-width="5"
    stroke-linejoin="round"
    text-anchor="middle"
    letter-spacing="1.1"
    paint-order="stroke"
  >Rank.</text>

  <!-- Rank. — fill layer -->
  <text
    x="260" y="196"
    font-family="Playfair Display Medium, Playfair Display, serif"
    font-weight="500"
    font-size="114"
    fill="#E08A28"
    text-anchor="middle"
    letter-spacing="1.1"
  >Rank.</text>
</svg>
