<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar com PIN — BlindRank</title>
<meta name="description" content="Digite o PIN da degustação para entrar e avaliar os vinhos no seu celular.">

<!-- Eudoxus Sans via Fontshare -->
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=eudoxus-sans@400,500,600&display=swap" rel="stylesheet">

<!-- DM Sans via Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  img { max-width: 100%; height: auto; display: block; }
  a { color: inherit; text-decoration: none; }

  :root {
    --t-bg: #ffffff;
    --t-text-1: #0a0a0a;
    --t-text-2: #3a3a3a;
    --t-text-3: #767676;
    --t-accent: #8B1A00;
    --t-accent-hover: #6B1200;
    --t-error: #B91C1C;
    --t-rule: rgba(10,10,10,0.08);
    --font-display: 'Eudoxus Sans', system-ui, -apple-system, sans-serif;
    --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
    --max-w: 1240px;
    --gutter: clamp(20px, 4vw, 56px);
  }

  body {
    font-family: var(--font-body);
    color: var(--t-text-1);
    background: var(--t-bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.94);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--t-rule);
  }
  .site-header__inner {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 18px var(--gutter);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .site-header__logo img { height: 56px; width: auto; }
  .site-header__home-link {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--t-text-2);
    font-weight: 500;
    transition: color 200ms ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .site-header__home-link:hover { color: var(--t-accent); }
  .site-header__home-link::before {
    content: "←";
    transition: transform 200ms ease;
  }
  .site-header__home-link:hover::before { transform: translateX(-3px); }

  /* Main */
  .pin-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px var(--gutter);
  }
  .pin-card {
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .pin-card__title {
    font-family: var(--font-display);
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--t-text-1);
    margin-bottom: 8px;
  }
  .pin-card__subtitle {
    font-size: 15px;
    color: var(--t-text-3);
    margin-bottom: 48px;
  }

  /* ── PIN box inputs ── */
  .pin-inputs {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
  }
  .pin-input {
    width: 56px;
    height: 72px;
    border: 2px solid rgba(10,10,10,0.12);
    border-radius: 12px;
    background: var(--t-bg);
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    color: var(--t-text-1);
    caret-color: transparent;
    outline: none;
    transition: border-color 200ms ease, background 200ms ease, box-shadow 200ms ease, transform 200ms ease;
    -moz-appearance: textfield;
    position: relative;
  }
  .pin-input::-webkit-outer-spin-button,
  .pin-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* Focus: accent ring */
  .pin-input:focus {
    border-color: var(--t-accent);
    box-shadow: 0 0 0 3px rgba(139,26,0,0.10);
  }

  /* Filled: bege bg + solid border */
  .pin-input.filled {
    background: #f6f4f0;
    border-color: var(--t-text-1);
    box-shadow: none;
  }

  /* Success flash */
  .pin-input.success {
    border-color: var(--t-accent);
    background: rgba(139,26,0,0.06);
    transform: scale(1.04);
  }

  /* Error: red border + shake */
  .pin-input.error {
    border-color: var(--t-error);
    box-shadow: 0 0 0 3px rgba(185,28,28,0.10);
    animation: pin-shake 400ms ease;
  }

  /* Number pop-in */
  .pin-input.pop {
    animation: pin-number-pop 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pin-number-pop {
    0%   { transform: scale(0.7); }
    65%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  @keyframes pin-shake {
    0%, 100% { transform: translateX(0); }
    20%  { transform: translateX(-4px); }
    40%  { transform: translateX(4px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .pin-input.pop { animation: none; }
    .pin-input.error { animation: none; }
    .pin-input.success { transform: none; }
  }

  /* Fake caret */
  .pin-input.caret::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 24px;
    background: var(--t-accent);
    border-radius: 1px;
    animation: caret-blink 1s step-end infinite;
    pointer-events: none;
  }

  @keyframes caret-blink {
    0%, 70%, 100% { opacity: 1; }
    20%, 50%      { opacity: 0; }
  }

  /* Button */
  .btn-accent {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 56px;
    padding: 0 48px;
    background: var(--t-accent);
    color: #ffffff;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 9999px;
    cursor: pointer;
    transition: background 200ms ease, transform 200ms ease;
    letter-spacing: -0.005em;
  }
  .btn-accent:hover:not(:disabled) {
    background: var(--t-accent-hover);
    transform: translateY(-1px);
  }
  .btn-accent:disabled {
    background: #e0e0e0;
    color: #999;
    cursor: default;
  }

  .pin-card__back {
    display: block;
    margin-top: 24px;
    font-size: 14px;
    color: var(--t-text-3);
    transition: color 200ms ease;
  }
  .pin-card__back:hover { color: var(--t-text-1); }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--t-rule);
    padding: 32px var(--gutter);
    max-width: var(--max-w);
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .site-footer__brand {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--t-text-1);
    letter-spacing: -0.01em;
  }
  .site-footer__brand .dot { color: #C04000; }
  .site-footer__meta {
    font-size: 12px;
    color: var(--t-text-3);
  }

  @media (max-width: 480px) {
    .pin-input { width: 52px; height: 60px; font-size: 24px; }
    .pin-inputs { gap: 10px; }
  }
</style>
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="site-header__logo" aria-label="BlindRank">
        <img src="../assets/images/blindrank-logo-notag.svg" alt="BlindRank" style="height: 56px; width: auto;">
      </a>
      <a href="/" class="site-header__home-link">Voltar ao site</a>
    </div>
  </header>

  <main class="pin-page">
    <div class="pin-card">
      <h1 class="pin-card__title">Digite o PIN da degustação</h1>
      <p class="pin-card__subtitle">4 dígitos, compartilhados pelo organizador</p>

      <form id="pin-form" autocomplete="off">
        <div class="pin-inputs">
          <input class="pin-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Dígito 1" autofocus>
          <input class="pin-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Dígito 2">
          <input class="pin-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Dígito 3">
          <input class="pin-input" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Dígito 4">
        </div>

        <button type="submit" class="btn-accent" disabled>Entrar</button>
      </form>

      <a href="/" class="pin-card__back">Voltar ao início</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__brand">BlindRank<span class="dot">.</span>wine</div>
    <div class="site-footer__meta">© 2026</div>
  </footer>

  <script>
    const APP_URL = 'https://blindrank-2026.vercel.app/pt-BR/';
    const inputs = document.querySelectorAll('.pin-input');
    const form = document.getElementById('pin-form');
    const btn = form.querySelector('.btn-accent');
    let submitting = false;

    function getPin() {
      return Array.from(inputs).map(i => i.value).join('');
    }

    function redirect(pin) {
      if (submitting) return;
      submitting = true;

      // Success flash
      inputs.forEach(i => i.classList.add('success'));

      setTimeout(() => {
        window.location.href = APP_URL + '?pin=' + pin;
      }, 400);
    }

    function updateState() {
      const pin = getPin();
      btn.disabled = pin.length < 4;

      inputs.forEach(i => {
        i.classList.toggle('filled', i.value.length > 0);
      });

      if (pin.length === 4) {
        redirect(pin);
      }
    }

    inputs.forEach((input, idx) => {
      // Digit typed
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(0, 1);

        if (input.value) {
          // Pop animation
          input.classList.remove('pop');
          void input.offsetWidth; // force reflow
          input.classList.add('pop');

          if (idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
        }
        updateState();
      });

      // Backspace
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) {
          inputs[idx - 1].focus();
          inputs[idx - 1].value = '';
          inputs[idx - 1].classList.remove('filled', 'pop');
          updateState();
        }
      });

      // Paste
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g, '').slice(0, 4);
        for (let i = 0; i < paste.length && i < inputs.length; i++) {
          inputs[i].value = paste[i];
          inputs[i].classList.add('filled', 'pop');
        }
        const focusIdx = Math.min(paste.length, inputs.length - 1);
        inputs[focusIdx].focus();
        updateState();
      });

      // Focus: clear error state
      input.addEventListener('focus', () => {
        inputs.forEach(i => i.classList.remove('error'));
      });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const pin = getPin();
      if (pin.length === 4) {
        redirect(pin);
      }
    });
  </script>

</body>
</html>
